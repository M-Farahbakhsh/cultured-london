name: Daily Event Scraper

on:
  schedule:
    # 2am UTC = 3am BST (UK summer time, currently in effect). GitHub Actions
    # cron always runs in UTC and can't auto-adjust for GMT/BST, so once the
    # UK falls back to GMT in late October this will fire at 2am UK time
    # instead of 3am — bump to '0 3 * * *' then if 3am UK time still matters.
    - cron: '0 2 * * *'
  workflow_dispatch:       # Allows you to trigger it manually from GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run all scrapers
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          SKIDDLE_API_KEY: ${{ secrets.SKIDDLE_API_KEY }}
          EVENTBRITE_API_KEY: ${{ secrets.EVENTBRITE_API_KEY }}
        run: python scrapers/run_all.py --no-browser
